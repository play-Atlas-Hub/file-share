<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <h1>⚔️ Tank Battle Arena</h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>

    <div class="dashboard">
        <h1>Welcome, <span id="username">Player</span>!</h1>
        
        <div class="stats">
            <div class="stat">
                <h3>Kills</h3>
                <p id="kills">0</p>
            </div>
            <div class="stat">
                <h3>Deaths</h3>
                <p id="deaths">0</p>
            </div>
            <div class="stat">
                <h3>Rank</h3>
                <p id="rank">1</p>
            </div>
            <div class="stat">
                <h3>Money</h3>
                <p id="money">0</p>
            </div>
        </div>

        <h2>Ready to Play?</h2>
        <p>Start the game client:</p>
        <code>python client_fixed.py</code>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        // Load stats
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('kills').textContent = data.total_kills;
                document.getElementById('deaths').textContent = data.total_deaths;
                document.getElementById('rank').textContent = data.current_rank;
                document.getElementById('money').textContent = data.total_money;
            });
    </script>
</body>
</html>
