Game Architecture Flowchart
===========================

[Client Side]
Start Client
├── Load client_configs.json
├── Initialize Pygame (lock cursor, fullscreen if set)
├── Enter Auth Loop
│   ├── Login/Register Screen
│   │   ├── Input username/password/email
│   │   ├── Send to Login Server
│   │   └── On success, proceed to Game Connection
│   └── On failure, show error
├── Connect to Game Server
│   ├── Send token, receive welcome
│   ├── Initialize local player
│   └── Enter Game Loop
└── Game Loop (60 FPS)
    ├── Handle Events (keys, mouse, quit)
    ├── Update Gameplay
    │   ├── Process server messages
    │   ├── Update local player position/angle
    │   ├── Send move/shoot/chat to server
    │   └── Update camera
    ├── Draw World
    │   ├── Apply day/night overlay
    │   ├── Draw quadrant grid
    │   ├── Draw blobs, bullets, remote players
    │   └── Draw local player
    ├── Draw HUD (health, minimap, chat)
    └── Check menu (if active, draw menu)

[Server Side]
Start Server
├── Load configs.json, msg.json
├── Initialize Database (create tables, load messages)
├── Start Login Server (port 8766)
│   └── Handle auth requests (register/login/verify)
├── Start Game Server (port 8765)
│   └── Handle game connections
├── Start Background Loops
│   ├── Blob Spawn Loop (batch spawn every BLOB_SPAWN_TIME)
│   └── Update Loop (60 FPS)
└── Update Loop
    ├── Update bullets (move, check collisions)
    ├── Update players (health regen, respawn)
    ├── Check collisions (bullet-player, bullet-blob, player-player)
    ├── Broadcast state every 100ms
    └── Log stats every 10s

[Shared Systems]
├── WebSocket Communication
│   ├── Client sends: move, shoot, chat
│   ├── Server broadcasts: state, chat, player join/leave
├── Anti-Cheat (speed, rate limiting)
├── Database (accounts, stats, sessions)
└── Config-Driven Settings (world size, speeds, etc.)